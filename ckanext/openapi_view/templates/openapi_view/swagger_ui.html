<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }} — API Documentation</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #fafafa;
    }
    .page-header {
      background: linear-gradient(135deg, #16213e, #0f3460);
      color: #fff;
      padding: 20px 32px;
    }
    .page-header h1 {
      margin: 0 0 4px 0;
      font-size: 22px;
      font-weight: 600;
    }
    .page-header p {
      margin: 0;
      font-size: 14px;
      opacity: 0.85;
    }
    .page-header a {
      color: #93c5fd;
      text-decoration: none;
    }
    .page-header a:hover {
      text-decoration: underline;
    }
    #swagger-ui {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 16px;
    }
    /* Clean up Swagger UI chrome */
    .swagger-ui .topbar { display: none !important; }
    .swagger-ui .info { margin: 20px 0 10px 0; }
    .swagger-ui .info .title small { display: none !important; }
    .swagger-ui .scheme-container { display: none !important; }
    .swagger-ui .auth-wrapper { display: none !important; }
    .swagger-ui section.models { display: none !important; }
    .swagger-ui .copy-to-clipboard { display: none !important; }
    /* Fix select dropdowns */
    .swagger-ui select {
      -webkit-appearance: menulist !important;
      -moz-appearance: menulist !important;
      appearance: menulist !important;
      cursor: pointer !important;
    }
    /* Data Dictionary table */
    .swagger-ui .info .renderedMarkdown table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      margin: 12px 0;
    }
    .swagger-ui .info .renderedMarkdown table th {
      background: #16213e;
      color: #fff;
      padding: 8px 12px;
      text-align: left;
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .swagger-ui .info .renderedMarkdown table td {
      padding: 6px 12px;
      border-bottom: 1px solid #e5e7eb;
      vertical-align: top;
    }
    .swagger-ui .info .renderedMarkdown table tr:hover td {
      background: #f0f4ff;
    }
    .loading-message {
      text-align: center;
      padding: 60px 20px;
      color: #6366f1;
      font-size: 16px;
    }
    .error-message {
      text-align: center;
      padding: 60px 20px;
      color: #dc2626;
      font-size: 16px;
    }
    .error-message a {
      color: #2563eb;
    }
  </style>
</head>
<body>
  <div class="page-header">
    <h1>{{ title }}</h1>
    <p>
      <a href="{{ ckan_url }}">{{ ckan_url }}</a>
      {% if back_url %} &middot; <a href="{{ back_url }}">Back to dataset</a>{% endif %}
    </p>
  </div>
  <div id="swagger-ui">
    <div class="loading-message">Loading API documentation&hellip;</div>
  </div>
  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
  <script>
    (function () {
      var specUrl = "{{ spec_url }}";
      fetch(specUrl, { credentials: "same-origin" })
        .then(function (resp) {
          if (!resp.ok) throw new Error("HTTP " + resp.status);
          return resp.json();
        })
        .then(function (data) {
          var spec = data.result || data;
          if (!spec.openapi) throw new Error("Invalid spec");
          document.getElementById("swagger-ui").innerHTML = "";
          SwaggerUIBundle({
            spec: spec,
            domNode: document.getElementById("swagger-ui"),
            presets: [SwaggerUIBundle.presets.apis],
            plugins: [SwaggerUIBundle.plugins.DownloadUrl],
            layout: "BaseLayout",
            tryItOutEnabled: true,
            docExpansion: "list",
            defaultModelsExpandDepth: 0
          });
        })
        .catch(function (err) {
          document.getElementById("swagger-ui").innerHTML =
            '<div class="error-message">' +
            '<p>Failed to load API documentation.</p>' +
            '<p>' + err.message + '</p>' +
            '</div>';
        });
    })();
  </script>
</body>
</html>
